root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./"
  entrypoint = ["./tmp/server"]
  include_ext = ["go", "sql"]
  exclude_dir = ["tmp", "vendor", "data"]
  delay = 1000 # ms to wait before rebuild

[log]
  time = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true

[misc]
  startup_banner = ""

[color]
  app = "green"
  build = "yellow"
  runner = "cyan"
